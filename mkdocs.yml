site_name: "Connected Services TechDocs"
site_description: "The TechDocs for Connected Services."
docs_dir: "docs"
repo_url: "https://github.com/bcgov/csit-connected-services-techdocs"
edit_uri: edit/main/docs
nav:
    - Introduction: index.md
    - Getting started: getting-started.md
    - Configuration: configuration.md
    - Tips and tricks: tips-and-tricks.md
    - About us: about-us.md
plugins:
    - techdocs-core
    - git-revision-date-localized
markdown_extensions:
    - md_in_html
